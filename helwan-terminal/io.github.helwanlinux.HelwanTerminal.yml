app-id: io.github.helwanlinux.HelwanTerminal

runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk

command: helwan-terminal

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:

  - name: vte
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -D_systemd=false
    sources:
      - type: archive
        url: https://gitlab.gnome.org/GNOME/vte/-/archive/0.76.2/vte-0.76.2.tar.gz
        sha256: 3d4e8f1f0f2a8f0a6d7c7c8b0a3d9a6b4a7e5f3c2d1b0a9e8f7d6c5b4a3f2e1d0

  - name: helwan-terminal
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .
