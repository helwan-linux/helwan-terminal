app-id: io.github.helwanlinux.HelwanTerminal

runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk

command: helwan-terminal

branch: stable

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:

  - name: vte
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -D_systemd=false
    sources:
      - type: archive
        url: https://gitlab.gnome.org/GNOME/vte/-/archive/0.76.2/vte-0.76.2.tar.gz
        sha256: 70a38449fda947e5cb7b4cecbe8a7a77586c799168bfb22162708c94084f21ae

  - name: helwan-terminal
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .
