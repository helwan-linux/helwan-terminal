app-id: io.github.helwanlinux.HelwanTerminal
runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk
command: helwan-terminal

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: helwan-terminal
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .
