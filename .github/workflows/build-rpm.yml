name: Build RPM Package

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            rpm-build \
            rpmdevtools \
            gcc \
            meson \
            ninja-build \
            gtk3-devel \
            vte291-devel \
            glib2-devel

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}

          tar --exclude='.git' \
              --exclude='builddir' \
              --transform='s,^,hel-terminal-0.1.3/,' \
              -czf ~/rpmbuild/SOURCES/hel-terminal-0.1.3.tar.gz .

      - name: Copy SPEC file
        run: |
          cp hel-terminal.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/hel-terminal.spec

      - name: Collect RPM
        run: |
          mkdir -p rpm-output
          find ~/rpmbuild/RPMS -name "*.rpm" -exec cp {} rpm-output/ \;

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: hel-terminal-rpm
          path: rpm-output/*.rpm
