name: Build RPM Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            rpm-build \
            gcc \
            meson \
            ninja-build \
            gtk3-devel \
            vte291-devel \
            glib2-devel

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Current directory:"
          pwd

          echo "Project directory:"
          ls -la helwan-terminal

          test -f helwan-terminal/meson.build
          test -f helwan-terminal/hel-terminal.spec
          test -d helwan-terminal/src
          test -d helwan-terminal/data

          echo "Project structure is correct."

      - name: Create RPM build directories
        run: |
          mkdir -p ~/rpmbuild/BUILD
          mkdir -p ~/rpmbuild/BUILDROOT
          mkdir -p ~/rpmbuild/RPMS
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p ~/rpmbuild/SRPMS

      - name: Copy SPEC file
        run: |
          cp helwan-terminal/hel-terminal.spec \
            ~/rpmbuild/SPECS/helwan-terminal.spec

      - name: Create source archive
        run: |
          mkdir -p /tmp/helwan-terminal-0.1.4

          cp -r helwan-terminal/src \
            /tmp/helwan-terminal-0.1.4/

          cp -r helwan-terminal/data \
            /tmp/helwan-terminal-0.1.4/

          cp helwan-terminal/meson.build \
            /tmp/helwan-terminal-0.1.4/

          cp helwan-terminal/LICENSE \
            /tmp/helwan-terminal-0.1.4/

          cp helwan-terminal/README.md \
            /tmp/helwan-terminal-0.1.4/

          tar -czf \
            ~/rpmbuild/SOURCES/helwan-terminal-0.1.4.tar.gz \
            -C /tmp \
            helwan-terminal-0.1.4

      - name: Build RPM
        run: |
          rpmbuild -ba \
            ~/rpmbuild/SPECS/helwan-terminal.spec

      - name: Collect RPM
        run: |
          mkdir -p rpm-output

          find ~/rpmbuild/RPMS \
            -type f \
            -name "*.rpm" \
            -exec cp {} rpm-output/ \;

          echo "RPM files:"
          ls -lh rpm-output

      - name: Upload RPM Package
        uses: actions/upload-artifact@v4
        with:
          name: helwan-terminal-rpm
          path: rpm-output/*.rpm
