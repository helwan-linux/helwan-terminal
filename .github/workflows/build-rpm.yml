name: Build RPM Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    container:
      image: fedora:latest

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            rpm-build \
            gcc \
            meson \
            ninja-build \
            gtk3-devel \
            vte291-devel \
            glib2-devel

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify project files
        run: |
          echo "Current directory:"
          pwd

          echo "Project files:"
          ls -la

          echo "Checking required files:"
          test -f meson.build
          test -f hel-terminal.spec
          test -d src
          test -d data

          echo "All required files found."

      - name: Create RPM build directories
        run: |
          mkdir -p ~/rpmbuild/BUILD
          mkdir -p ~/rpmbuild/BUILDROOT
          mkdir -p ~/rpmbuild/RPMS
          mkdir -p ~/rpmbuild/SOURCES
          mkdir -p ~/rpmbuild/SPECS
          mkdir -p ~/rpmbuild/SRPMS

      - name: Copy SPEC file
        run: |
          cp ./hel-terminal.spec ~/rpmbuild/SPECS/hel-terminal.spec

      - name: Create source archive
        run: |
          mkdir -p /tmp/hel-terminal-0.1.3

          cp -r src /tmp/hel-terminal-0.1.3/
          cp -r data /tmp/hel-terminal-0.1.3/
          cp meson.build /tmp/hel-terminal-0.1.3/
          cp LICENSE /tmp/hel-terminal-0.1.3/
          cp README.md /tmp/hel-terminal-0.1.3/

          tar -czf \
            ~/rpmbuild/SOURCES/hel-terminal-0.1.3.tar.gz \
            -C /tmp \
            hel-terminal-0.1.3

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/hel-terminal.spec

      - name: Collect RPM
        run: |
          mkdir -p rpm-output

          find ~/rpmbuild/RPMS \
            -type f \
            -name "*.rpm" \
            -exec cp {} rpm-output/ \;

          echo "RPM files:"
          ls -lh rpm-output

      - name: Upload RPM Package
        uses: actions/upload-artifact@v4
        with:
          name: hel-terminal-rpm
          path: rpm-output/*.rpm
