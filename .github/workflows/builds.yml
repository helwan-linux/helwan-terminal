name: Build Arch Package

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel git meson ninja gtk3 vte3 glib2

      - name: Create source tarball
        run: |
          mkdir -p /tmp/pkgsrc/hel-terminal
          rsync -a \
            --exclude=.git \
            --exclude=build \
            --exclude=.github \
            ./ /tmp/pkgsrc/hel-terminal/
          tar -C /tmp/pkgsrc -czf "$GITHUB_WORKSPACE/hel-terminal-0.1.4.tar.gz" hel-terminal

      - name: Build package
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd $GITHUB_WORKSPACE && makepkg -sf --noconfirm"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"
