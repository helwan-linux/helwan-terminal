name: Build Arch Package

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm base-devel gtk3 vte3 glib2 meson ninja

      - name: Build package
        env:
          EUID: "1000"
        run: |
          # استبعاد المجلدات غير الضرورية وضغط الملفات بأمان تام
          tar --exclude='.git' --exclude='build' --exclude='*.pkg.tar.zst' -czf hel-terminal-0.1.4.tar.gz .
          
          # بناء الحزمة
          makepkg -sf --noconfirm

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"
