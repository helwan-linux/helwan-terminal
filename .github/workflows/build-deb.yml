name: Build DEB Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    container:
      image: debian:bookworm-slim

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            build-essential \
            meson \
            ninja-build \
            libgtk-3-dev \
            libvte-2.91-dev \
            libglib2.0-dev \
            dpkg-dev

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Current directory:"
          pwd

          echo "Repository files:"
          ls -la

          echo "Checking project directory:"
          ls -la helwan-terminal

          test -f helwan-terminal/meson.build
          test -d helwan-terminal/src
          test -d helwan-terminal/data

          echo "Project structure is correct."

      - name: Configure Meson
        working-directory: helwan-terminal
        run: |
          meson setup builddir --prefix=/usr

      - name: Compile
        working-directory: helwan-terminal
        run: |
          meson compile -C builddir

      - name: Create DEB package
        working-directory: helwan-terminal
        run: |
          rm -rf package

          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/glib-2.0/schemas
          mkdir -p package/usr/share/icons/hicolor/64x64/apps

          cp builddir/helwan-terminal \
            package/usr/bin/helwan-terminal

          cp data/helwan-terminal.desktop \
            package/usr/share/applications/helwan-terminal.desktop

          cp data/helwan-terminal.gschema.xml \
            package/usr/share/glib-2.0/schemas/helwan-terminal.gschema.xml

          cp data/icons/hicolor/64x64/apps/helwan-terminal.png \
            package/usr/share/icons/hicolor/64x64/apps/helwan-terminal.png

          cat > package/DEBIAN/control << 'EOF'
          Package: helwan-terminal
          Version: 0.1.4-1
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Saeed Badreldin <helwanlinux@gmail.com>
          Depends: libgtk-3-0, libvte-2.91-0, libglib2.0-0
          Description: Helwan Terminal
           A powerful and customizable terminal emulator for Helwan Linux.
          EOF

          cat > package/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e

          if command -v glib-compile-schemas >/dev/null 2>&1; then
              glib-compile-schemas /usr/share/glib-2.0/schemas
          fi

          exit 0
          EOF

          chmod 755 package/DEBIAN/postinst

          dpkg-deb --build \
            --root-owner-group \
            package \
            helwan-terminal_0.1.4-1_amd64.deb

      - name: Verify DEB package
        working-directory: helwan-terminal
        run: |
          ls -lh helwan-terminal_0.1.4-1_amd64.deb
          dpkg-deb --info helwan-terminal_0.1.4-1_amd64.deb

      - name: Upload DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: helwan-terminal-deb
          path: helwan-terminal/helwan-terminal_0.1.4-1_amd64.deb
