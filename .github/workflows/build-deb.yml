name: Build DEB Package

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential meson ninja-build libgtk-3-dev libvte-2.91-dev libglib2.0-dev dpkg-dev

      - name: Configure and Build
        run: |
          meson setup build
          meson compile -C build
          # يمكنك هنا إضافة أوامر حزم دبيان الخاصة بك (مثل dpkg أو checkinstall إذا لزم الأمر)
          
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/  # أو مسار الحزمة الناتجة (.deb)
