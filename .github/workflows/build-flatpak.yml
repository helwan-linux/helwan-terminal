name: Build Flatpak Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flatpak and Flatpak Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder

      - name: Add Flathub Repository
        run: |
          flatpak remote-add \
            --if-not-exists \
            --user \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK and Runtime
        run: |
          flatpak install \
            --user \
            --noninteractive \
            flathub \
            org.gnome.Sdk//46 \
            org.gnome.Platform//46

      - name: Verify Project Files
        run: |
          echo "Current directory:"
          pwd

          echo "Project files:"
          ls -la

          echo "Checking Manifest:"
          test -f ./io.github.helwanlinux.HelwanTerminal.yml

          echo "Manifest found successfully:"
          ls -l ./io.github.helwanlinux.HelwanTerminal.yml

          echo "Checking Meson:"
          test -f ./meson.build

          echo "Meson file found successfully:"
          ls -l ./meson.build

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --disable-rofiles-fuse \
            --force-clean \
            build-dir \
            ./io.github.helwanlinux.HelwanTerminal.yml

      - name: Create Flatpak Bundle
        run: |
          flatpak build-bundle \
            ~/.local/share/flatpak/repo \
            helwan-terminal.flatpak \
            io.github.helwanlinux.HelwanTerminal

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: helwan-terminal-flatpak
          path: helwan-terminal.flatpak
          if-no-files-found: error
