name: Build Flatpak Package

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/flathub/flatpak-builder:base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak Runtime
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          flatpak install -y --user flathub \
            org.gnome.Sdk/x86_64/46 \
            org.gnome.Platform/x86_64/46

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --disable-rofiles-fuse \
            --force-clean \
            build-dir \
            io.github.helwanlinux.HelwanTerminal.yml

      - name: Build Bundle
        run: |
          flatpak build-bundle \
            ~/.local/share/flatpak/repo \
            helwan-terminal.flatpak \
            io.github.helwanlinux.HelwanTerminal

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: helwan-terminal-flatpak
          path: helwan-terminal.flatpak
