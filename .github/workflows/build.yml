name: Build Packages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm sudo base-devel meson ninja gtk3 vte4

      - name: Create builder
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Build package
        run: |
          sudo -u builder makepkg -sf --noconfirm

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf -y install rpm-build rpmdevtools meson ninja-build gcc gtk3-devel vte291-devel glib2-devel

      - name: Build RPM
        run: |
          rpmbuild -ba hel-terminal.spec

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: "/root/rpmbuild/RPMS/**/*.rpm"
